<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Formulário de comentário </title>
</head>

<body>
    <section>
        <h2 class="h2_amarelo">SISTEMA DE GESTÃO ACADEMICA</h2>
        <section>
            <h2 class="h2_bold">MANUTENÇÃO DE USUÁRIOS DO SISTEMA INTERNO</h2>

            <form>
                Login
                <input type="text" name="login"><br><br>

                Senha
                <input type="password" name="senha"><br><br>

                Status
                <select name="status" id="">
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select><br><br>

                Tipo
                <input type="radio" name="tipo" value="tecnico"> Técnico
                <input type="radio" name="tipo" value="professor"> Professor
                <input type="radio" name="tipo" value="aluno"> Aluno <br><br>

                Data de Criação
                <input type="date" name="data_criacao"><br><br>

                Perfil
                <input type="radio" name="perfil" value="admin"> Convidado
                <input type="radio" name="perfil" value="admin"> Administrador <br><br>


                Observações <br>
                <textarea name="observacoes" rows="7" cols="40" style="overflow-y: scroll; resize: none; overflow-x: hidden;"></textarea> <br><br>

                Módulos <br>
                <input type="checkbox" name="modulos" value="cadastro"> Compras
                <input type="checkbox" name="modulos" value="cadastro"> Biblioteca
                <input type="checkbox" name="modulos" value="cadastro"> Acadêmico <br><br>
                <input type="checkbox" name="modulos" value="cadastro"> Documentação
                <input type="checkbox" name="modulos" value="cadastro"> Recursos Humanos <br><br>


                <input type="submit" value="Cadastrar">
                <input type="reset" value="Excluir">
            </form>
</body>

</html>
